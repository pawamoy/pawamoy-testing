[coverage:paths]
source =
  src/pawamoy_testing
  */site-packages/pawamoy_testing

[coverage:run]
branch = true
source =
  pawamoy_testing
  tests
parallel = true

[coverage:report]
precision = 2
omit =
  src/pawamoy_testing/__init__.py
  src/pawamoy_testing/__main__.py
  tests/*

[coverage:html]
directory = build/coverage

[coverage:json]
output = build/coverage.json
